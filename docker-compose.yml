version: '3.8'
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - cache

  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      - POSTGRES_USER=alpha_admin
      - POSTGRES_PASSWORD=alpha_pass
      - POSTGRES_DB=alphabot_db
    ports:
      - "5432:5432"

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"